services:
  api:
    build: ./pc-shop-api

    ports:
      - "3002:3002"

    env_file:
      - ./pc-shop-api/.env

    depends_on:
      - postgres
      - redis

  payment-service:
    build: ./payment-service

    env_file:
      - ./payment-service/.env

    depends_on:
      - payment-postgres
      - redis

  postgres:
    image: postgres:16

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: pcshop

  payment-postgres:
    image: postgres:16

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: payments

  redis:
    image: redis:7

    ports:
      - "6379:6379"